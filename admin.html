<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Panel Moderator - Admin Page Q-A PKSP 2026</title>
<style>
  :root {
    --bg: #f4f1ea;
    --panel: #ffffff;
    --border: #e2ddd0;
    --text: #26251f;
    --muted: #7a776c;
    --gold: #a97f3a;
    --green: #3b6d11;
    --red: #a32d2d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px 16px 60px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  header { margin-bottom: 20px; }
  .eyebrow { color: var(--gold); font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; margin: 0 0 4px; font-weight: 600; }
  h1 { font-size: 20px; margin: 0; }

  .tabs { display: flex; gap: 8px; margin-bottom: 18px; }
  .tab {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
    font-size: 13px;
    cursor: pointer;
    color: var(--muted);
  }
  .tab.active { border-color: var(--gold); color: var(--gold); font-weight: 600; background: #fbf3e4; }
  .tab .count { font-weight: 700; }

  .q-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 12px;
  }
  .q-text { font-size: 15px; line-height: 1.5; margin: 0 0 8px; }
  .q-meta { font-size: 12px; color: var(--muted); margin: 0 0 12px; display: flex; gap: 10px; align-items: center; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge.pending { background: #fbf3e4; color: var(--gold); }
  .badge.approved { background: #e7f0dc; color: var(--green); }
  .badge.answered { background: #dde8f0; color: #2f5f7a; }
  .badge.rejected { background: #fbe4e4; color: var(--red); }

  .actions { display: flex; gap: 8px; }
  button {
    flex: 1;
    padding: 9px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  button.approve { color: var(--green); border-color: #c0dd97; }
  button.reject { color: var(--red); border-color: #f0acac; }
  button.undo { color: var(--muted); }
  .empty { text-align: center; color: var(--muted); font-size: 14px; padding: 40px 0; }

  #gate {
    max-width: 320px;
    margin: 120px auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
  }
  #gate input { width: 100%; padding: 10px; margin: 12px 0; border-radius: 8px; border: 1px solid var(--border); font-size: 14px; }
  #gate button { background: var(--gold); color: #fff; border: none; }
  #gate p.note { font-size: 11px; color: var(--muted); margin-top: 14px; line-height: 1.5; }
</style>
</head>
<body>

  <div id="gate">
    <p class="eyebrow">Panel moderator</p>
    <h1>Admin Page Q-A PKSP 2026</h1>
    <input id="email-input" type="email" placeholder="Emel moderator" />
    <input id="pass-input" type="password" placeholder="Kata laluan moderator" />
    <button id="pass-btn" style="width:100%">Masuk sebagai moderator</button>
    <p class="note">Gunakan akaun moderator Firebase Authentication. Emel moderator mesti turut dibenarkan dalam firestore.rules.</p>
  </div>

  <div class="wrap" id="app" style="display:none;">
    <header>
      <p class="eyebrow">Panel moderator</p>
      <h1>Admin Page Q-A PKSP 2026</h1>
    </header>

    <div class="tabs">
      <div class="tab active" data-status="pending">Menunggu <span class="count" id="count-pending">0</span></div>
      <div class="tab" data-status="approved">Diluluskan <span class="count" id="count-approved">0</span></div>
      <div class="tab" data-status="answered">Dijawab <span class="count" id="count-answered">0</span></div>
      <div class="tab" data-status="rejected">Ditolak <span class="count" id="count-rejected">0</span></div>
    </div>

    <div id="q-list"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import { initializeFirestore, collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
    import { firebaseConfig, QUESTIONS_COLLECTION, SESSION_ID } from "./firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, { experimentalForceLongPolling: true });
    const auth = getAuth(app);
    let appStarted = false;

    document.getElementById("pass-btn").addEventListener("click", async () => {
      const email = document.getElementById("email-input").value.trim();
      const password = document.getElementById("pass-input").value;
      if (!email || !password) {
        alert("Sila masukkan emel dan kata laluan moderator");
        return;
      }
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (e) {
        console.error(e);
        alert("Gagal masuk. Semak emel/kata laluan moderator.");
      }
    });

    onAuthStateChanged(auth, (user) => {
      if (!user || appStarted) return;
      document.getElementById("gate").style.display = "none";
      document.getElementById("app").style.display = "block";
      appStarted = true;
      startApp();
    });

    function startApp() {
      let allDocs = [];
      let activeTab = "pending";

      // Query guna sessionId sahaja - elak keperluan composite index Firestore.
      // Susunan ikut undi dibuat di sisi browser.
      const qQuery = query(
        collection(db, QUESTIONS_COLLECTION),
        where("sessionId", "==", SESSION_ID)
      );

      onSnapshot(qQuery, (snap) => {
        allDocs = snap.docs
          .map(d => ({ id: d.id, ...d.data() }))
          .sort((a, b) => (b.voteCount || 0) - (a.voteCount || 0));
        render();
      }, (err) => {
        console.error("Ralat listener:", err);
        document.getElementById("q-list").innerHTML =
          '<p class="empty">Gagal muatkan soalan: ' + (err.code || err.message) + '</p>';
      });

      document.querySelectorAll(".tab").forEach(tab => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
          tab.classList.add("active");
          activeTab = tab.dataset.status;
          render();
        });
      });

      async function setStatus(id, status) {
        try {
          await updateDoc(doc(db, QUESTIONS_COLLECTION, id), { status });
        } catch (e) {
          console.error(e);
          alert("Gagal kemaskini status");
        }
      }

      function render() {
        ["pending", "approved", "answered", "rejected"].forEach(s => {
          document.getElementById(`count-${s}`).textContent = allDocs.filter(d => d.status === s).length;
        });

        const list = document.getElementById("q-list");
        const items = allDocs.filter(d => d.status === activeTab);

        if (items.length === 0) {
          list.innerHTML = '<p class="empty">Tiada soalan dalam kategori ini.</p>';
          return;
        }

        list.innerHTML = "";
        items.forEach(q => {
          const card = document.createElement("div");
          card.className = "q-card";
          let actionsHtml = "";
          if (q.status === "pending") {
            actionsHtml = `
              <button class="approve" data-target="approved">Luluskan</button>
              <button class="reject" data-target="rejected">Tolak</button>
            `;
          } else if (q.status === "approved") {
            actionsHtml = `
              <button class="approve" data-target="answered">Tandai telah dijawab</button>
              <button class="undo" data-target="pending">Kembalikan ke menunggu</button>
            `;
          } else if (q.status === "answered") {
            actionsHtml = `<button class="undo" data-target="approved">Kembalikan ke diluluskan</button>`;
          } else {
            actionsHtml = `<button class="undo" data-target="pending">Kembalikan ke menunggu</button>`;
          }
          card.innerHTML = `
            <p class="q-text">${escapeHtml(q.text)}</p>
            <p class="q-meta">
              <span class="badge ${q.status}">${statusLabel(q.status)}</span>
              <span>${escapeHtml(q.name || "Anonim")}</span>
              <span>&middot; ${q.voteCount || 0} undi</span>
            </p>
            <div class="actions">${actionsHtml}</div>
          `;
          card.querySelectorAll("button[data-target]").forEach(btn => {
            btn.addEventListener("click", () => setStatus(q.id, btn.dataset.target));
          });
          list.appendChild(card);
        });
      }

      function statusLabel(s) {
        return { pending: "Menunggu", approved: "Diluluskan", answered: "Dijawab", rejected: "Ditolak" }[s] || s;
      }

      function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }
    }
  </script>
</body>
</html>
